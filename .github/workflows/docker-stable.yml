name: Build and Publish Docker Stable

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  docker-stable:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image name
        id: image
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Compute version tags
        id: vars
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR with PAT
        if: ${{ env.GHCR_TOKEN != '' && env.GHCR_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.GHCR_USERNAME }}
          password: ${{ env.GHCR_TOKEN }}

      - name: Log in to GHCR with GITHUB_TOKEN
        if: ${{ !(env.GHCR_TOKEN != '' && env.GHCR_USERNAME != '') }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=stable
            type=raw,value=${{ steps.vars.outputs.version }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=otto
            org.opencontainers.image.description=Otto Docker runtime (stable channel)
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.vars.outputs.version }}

      - name: Build and push stable image
        id: build_push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print release summary
        run: |
          echo "### Docker Stable Published" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tags:" >> "$GITHUB_STEP_SUMMARY"
          echo "  - stable" >> "$GITHUB_STEP_SUMMARY"
          echo "  - ${{ steps.vars.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "  - latest" >> "$GITHUB_STEP_SUMMARY"
          echo "- Digest: \\`${{ steps.build_push.outputs.digest }}\\`" >> "$GITHUB_STEP_SUMMARY"
